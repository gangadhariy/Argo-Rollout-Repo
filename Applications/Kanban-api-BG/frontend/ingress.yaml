apiVersion: networking.k8s.io/v1
kind: Ingress

metadata:
  name: frontend
  namespace: frontend

spec:
  ingressClassName: nginx

  rules:
  - host: ec2-54-163-52-103.compute-1.amazonaws.com

    http:
      paths:
      - path: /
        pathType: Prefix

        backend:
          service:
            name: frontend-active
            port:
              number: 80